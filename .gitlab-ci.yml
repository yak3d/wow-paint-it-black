stages:
  - tag
  - package
  - release

tag-version:
  stage: tag
  image: alpine:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - apk add --no-cache git
    - git fetch --depth=2 origin main
    - VERSION=$(grep -m1 '^## Version:' PaintItBlack/PaintItBlack.toc | awk '{print $3}')
    - 'PREV=$(git show HEAD~1:PaintItBlack/PaintItBlack.toc 2>/dev/null | grep -m1 "^## Version:" | awk "{print \$3}") || PREV=""'
    - echo "Current=$VERSION Previous=$PREV"
    - |
      if [ "$VERSION" = "$PREV" ] || [ -z "$VERSION" ]; then
        echo "Version unchanged or unreadable, skipping tag."
        exit 0
      fi
    - TAG="v${VERSION}"
    - |
      if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
        echo "Tag ${TAG} already exists, skipping."
        exit 0
      fi
    - git tag "$TAG"
    - git remote set-url origin "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
    - git push origin "$TAG"
    - echo "Pushed tag ${TAG}"

build-archive:
  stage: package
  image: alpine:latest
  needs: []
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG =~ /^v/
  script:
    - apk add --no-cache zip
    - VERSION=$(grep -m1 '^## Version:' PaintItBlack/PaintItBlack.toc | awk '{print $3}')
    - zip -r "PaintItBlack-Retail-v${VERSION}.zip" PaintItBlack/*.toc PaintItBlack/*.lua PaintItBlack/*.xml
  artifacts:
    paths:
      - "PaintItBlack-Retail-*.zip"
    expire_in: never

publish-release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: build-archive
      artifacts: true
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
  script:
    - ZIPFILE=$(ls PaintItBlack-Retail-*.zip)
    - echo "Publishing release ${CI_COMMIT_TAG} with asset ${ZIPFILE}"
    - |
      release-cli create \
        --name "PaintItBlack ${CI_COMMIT_TAG}" \
        --tag-name "${CI_COMMIT_TAG}" \
        --description "Release ${CI_COMMIT_TAG}" \
        --assets-link "{\"name\":\"${ZIPFILE}\",\"url\":\"${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/${ZIPFILE}?job=build-archive\",\"link_type\":\"package\"}"
