name: Tag & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag-version:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
      version: ${{ steps.version.outputs.current }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect version change
        id: version
        run: |
          VERSION=$(grep -m1 '^## Version:' PaintItBlack/PaintItBlack.toc | awk '{print $3}')
          PREV=$(git show HEAD~1:PaintItBlack/PaintItBlack.toc 2>/dev/null | grep -m1 '^## Version:' | awk '{print $3}') || PREV=""
          echo "current=$VERSION" >> "$GITHUB_OUTPUT"
          echo "previous=$PREV" >> "$GITHUB_OUTPUT"
          echo "Current=$VERSION Previous=$PREV"

      - name: Create and push tag
        id: tag
        if: steps.version.outputs.current != steps.version.outputs.previous && steps.version.outputs.current != ''
        run: |
          TAG="v${{ steps.version.outputs.current }}"
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
            echo "Tag ${TAG} already exists, skipping."
            exit 0
          fi
          git tag "$TAG"
          git push origin "$TAG"
          echo "new_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Pushed tag ${TAG}"

  build-and-release:
    needs: tag-version
    if: needs.tag-version.outputs.new_tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build zip
        run: |
          VERSION="${{ needs.tag-version.outputs.version }}"
          zip -r "PaintItBlack-Retail-v${VERSION}.zip" PaintItBlack/*.toc PaintItBlack/*.lua PaintItBlack/*.xml

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag-version.outputs.new_tag }}
          name: PaintItBlack ${{ needs.tag-version.outputs.new_tag }}
          body: "Release ${{ needs.tag-version.outputs.new_tag }}"
          files: PaintItBlack-Retail-v*.zip
