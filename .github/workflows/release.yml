name: Tag & Release

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  tag-version:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect version change
        id: version
        run: |
          VERSION=$(grep -m1 '^## Version:' PaintItBlack/PaintItBlack.toc | awk '{print $3}')
          PREV=$(git show HEAD~1:PaintItBlack/PaintItBlack.toc 2>/dev/null | grep -m1 '^## Version:' | awk '{print $3}') || PREV=""
          echo "current=$VERSION" >> "$GITHUB_OUTPUT"
          echo "previous=$PREV" >> "$GITHUB_OUTPUT"
          echo "Current=$VERSION Previous=$PREV"

      - name: Create and push tag
        if: steps.version.outputs.current != steps.version.outputs.previous && steps.version.outputs.current != ''
        run: |
          TAG="v${{ steps.version.outputs.current }}"
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
            echo "Tag ${TAG} already exists, skipping."
            exit 0
          fi
          git tag "$TAG"
          git push origin "$TAG"
          echo "Pushed tag ${TAG}"

  build-archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build zip
        run: |
          VERSION=$(grep -m1 '^## Version:' PaintItBlack/PaintItBlack.toc | awk '{print $3}')
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          zip -r "PaintItBlack-Retail-v${VERSION}.zip" PaintItBlack/*.toc PaintItBlack/*.lua PaintItBlack/*.xml

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PaintItBlack-Retail-v${{ env.VERSION }}
          path: PaintItBlack-Retail-*.zip
          retention-days: 90

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-archive
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          pattern: PaintItBlack-Retail-*
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: PaintItBlack ${{ github.ref_name }}
          body: "Release ${{ github.ref_name }}"
          files: PaintItBlack-Retail-*.zip
